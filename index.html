<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Medet Tleugabyluly - software developer based in Auckland, New Zealand." />
  <title>Medet Tleugabyluly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --text: #f5f5f7;
      --muted: #a1a1aa;
      --line: #242426;
      --hover: #d4d4d8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      line-height: 1.4;
    }

    .page {
      width: min(760px, calc(100% - 40px));
      margin: 0 auto;
      padding: 40px 0 40px;
    }

    h1 {
      margin: 0;
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
    }

    .social {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .social a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
    }

    .social a:hover {
      color: var(--hover);
    }

    .social svg {
      width: 16px;
      height: 16px;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .divider {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 18px 0 10px;
    }

    .apps {
      display: grid;
      gap: 12px;
    }

    .app {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: start;
      padding: 6px 0;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #2c2c2e;
      background: #0b0b0c;
    }

    .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .icon-link {
      display: block;
      color: inherit;
      text-decoration: none;
      line-height: 0;
    }

    .app-main {
      min-width: 0;
      align-self: center;
    }

    .app-name {
      margin: 2px 0 6px;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .app-name a {
      color: inherit;
      text-decoration: none;
    }

    .app-name a:hover {
      color: var(--hover);
    }

    .badge-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      line-height: 0;
    }

    .badge-link img {
      display: block;
      height: 32px;
      width: auto;
    }

    .text-link {
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 400;
    }

    .text-link:hover {
      color: var(--hover);
    }

    .inline-open {
      display: inline-block;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      margin-top: 2px;
    }

    .inline-open:hover {
      color: var(--text);
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.01em;
      text-align: center;
    }

    @media (max-width: 640px) {
      .page {
        width: calc(100% - 28px);
        padding-top: 24px;
      }

      .subtitle {
        font-size: 15px;
      }

      .social {
        gap: 14px;
      }

      .app {
        grid-template-columns: 56px 1fr;
        gap: 12px;
      }

      .icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
      }

      .app-name {
        font-size: 15px;
        margin-top: 0;
      }

      .badge-link img {
        height: 30px;
      }
    }
  </style>
</head>
<body>

    </section>

    <footer>© 2026 MEDET TLEUGABYLULY LIMITED</footer>
  </main>

</body>
</html>
